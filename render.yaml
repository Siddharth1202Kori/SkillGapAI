services:
  - type: web
    name: skillgap-ai
    runtime: python
    region: oregon

    # Step 1: Install all Python deps
    # Step 2: Pre-download the CrossEncoder model into cache so cold starts are fast
    buildCommand: |
      pip install -r requirements.txt &&
      python download_models.py

    # gthread workers handle long-running requests without timing out
    # --timeout 300 gives 5 minutes for scraping + embedding + LLM generation
    startCommand: gunicorn app:app --worker-class gthread --workers 1 --threads 4 --timeout 300 --bind 0.0.0.0:$PORT

    # Persistent disk so ChromaDB and rag_outputs survive restarts
    disk:
      name: skillgap-data
      mountPath: /var/data
      sizeGB: 1

    envVars:
      - key: MISTRAL_API_KEY
        sync: false          # Set manually in Render dashboard → Environment
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      # Tells HuggingFace where to cache models (baked into the container image, outside the empty disk)
      - key: HF_HOME
        value: /opt/render/project/src/.hf_cache
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma_db
